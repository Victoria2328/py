{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm border-0 m-auto text-center p-4" style="max-width: 450px; border-radius: 20px;">
        <div class="card-body">
            <i class="fas fa-trash-alt fa-4x text-danger mb-4"></i>
            <h3 class="font-weight-bold">¿Estás seguro?</h3>
            <p class="text-muted">
                Vas a eliminar el registro de producción del día <br>
                <strong class="text-dark">{{ registro.fecha_recoleccion|date:"d/m/Y" }}</strong> del <strong>{{ registro.lote }}</strong>.
            </p>
            <hr>
            <form method="post">
                {% csrf_token %}
                <div class="d-flex justify-content-around">
                    <a href="{% url 'produccion_lista' %}" class="btn btn-light btn-round px-4">Cancelar</a>
                    <button type="submit" class="btn btn-danger btn-round px-4 shadow">Sí, eliminar</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
