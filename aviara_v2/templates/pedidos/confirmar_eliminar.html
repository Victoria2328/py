{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-lg border-0" style="border-radius: 15px;">
                <div class="card-body text-center p-5">
                    <div class="text-danger mb-4">
                        <i class="fas fa-exclamation-triangle fa-4x"></i>
                    </div>
                    
                    <h3 class="font-weight-bold text-dark">¿Eliminar pedido?</h3>
                    <p class="text-muted">
                        Estás a punto de eliminar el pedido <strong>#{{ pedido.id }}</strong> 
                        del cliente <strong>{{ pedido.cliente }}</strong>. 
                        Esta acción no se puede deshacer.
                    </p>

                    <form method="POST" class="mt-4">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center">
                            <a href="{% url 'lista_pedidos' %}" class="btn btn-outline-secondary btn-round px-4 mr-2">
                                No, mantener
                            </a>
                            <button type="submit" class="btn btn-danger btn-round px-4 shadow-sm">
                                Sí, eliminar
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-round { border-radius: 50px; }
    .card { border-top: 5px solid #dc3545; }
</style>
{% endblock %}
