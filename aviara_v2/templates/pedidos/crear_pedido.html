{% extends 'base.html' %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-lg border-0" style="border-radius: 15px;">
                <div class="card-header bg-danger text-white p-4" style="border-radius: 15px 15px 0 0;">
                    <h3 class="mb-0"><i class="fas fa-cart-plus mr-2"></i> {{ titulo }}</h3>
                </div>
                <div class="card-body p-4">
                    <form method="POST">
                        {% csrf_token %}
                        
                        {% for field in form %}
                        <div class="form-group mb-3">
                            <label class="font-weight-bold text-dark">{{ field.label }}</label>
                            {{ field }}
                            {% if field.help_text %}
                                <small class="form-text text-muted">{{ field.help_text }}</small>
                            {% endif %}
                            {% for error in field.errors %}
                                <div class="text-danger small">{{ error }}</div>
                            {% endfor %}
                        </div>
                        {% endfor %}

                        <hr>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'lista_pedidos' %}" class="btn btn-outline-secondary btn-round px-4">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger btn-round px-4 shadow-sm">
                                Guardar Pedido
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .btn-round { border-radius: 50px; }
    .form-control { border-radius: 10px; border: 1px solid #e3e6f0; }
    .form-control:focus { border-color: #fb6340; box-shadow: none; }
</style>
{% endblock %}
