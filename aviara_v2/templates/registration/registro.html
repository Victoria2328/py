{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<section class="d-flex align-items-center justify-content-center" style="min-height: 90vh;">

    <div class="container">

        <div class="row justify-content-center">

            <div class="col-md-6 col-lg-5">

                <div class="card shadow-lg border-0">

                    <!-- HEADER -->
                    <div class="text-center p-4"
                         style="background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-claro)); color: white; border-radius: 15px 15px 0 0;">

                        <h3 class="font-weight-bold mb-1">AVIARA</h3>
                        <small>Crea tu cuenta y compra fresco</small>

                    </div>

                    <!-- BODY -->
                    <div class="card-body p-4">

                        <h5 class="text-center font-weight-bold mb-4">
                            Crear cuenta
                        </h5>

                        <form method="post">
                            {% csrf_token %}

                            {{ form|crispy }}

                            <button type="submit"
                                    class="btn btn-warning btn-block mt-3 font-weight-bold rounded-pill">
                                Registrarme
                            </button>
                        </form>

                        <hr>

                        <p class="text-center small mb-0">
                            ¿Ya tienes cuenta?
                            <a href="{% url 'login' %}" class="font-weight-bold" style="color: var(--verde-oscuro);">
                                Inicia sesión
                            </a>
                        </p>

                    </div>

                </div>

            </div>

        </div>

    </div>

</section>

{% endblock %}
