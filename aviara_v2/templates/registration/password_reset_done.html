{% extends "base.html" %}

{% block content %}

<section class="py-5" style="background: var(--beige); min-height: 80vh;">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow border-0 text-center p-4">

                    <!-- ICONO -->
                    <div class="mb-3">
                        <i class="fas fa-envelope-open-text fa-3x" style="color: var(--dorado);"></i>
                    </div>

                    <!-- TÍTULO -->
                    <h2 class="font-weight-bold mb-3" style="color: var(--verde-oscuro);">
                        📩 Correo enviado
                    </h2>

                    <!-- TEXTO -->
                    <p class="text-muted mb-4">
                        Si la cuenta existe, enviamos un enlace para restablecer tu contraseña.
                    </p>

                    <!-- BOTÓN -->
                    <a href="{% url 'login' %}" class="btn btn-outline-dark btn-block">
                        Volver al login
                    </a>

                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
