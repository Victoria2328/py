{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block content %}

<section class="py-5" style="background: var(--beige); min-height: 80vh;">
    <div class="container">

        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">

                <div class="card shadow border-0">

                    <!-- HEADER -->
                    <div class="card-header text-center"
                         style="background: linear-gradient(135deg, var(--verde-oscuro), var(--verde-claro)); color: white;">
                        <h4 class="mb-0 font-weight-bold">
                             Nueva contraseña
                        </h4>
                    </div>

                    <!-- BODY -->
                    <div class="card-body p-4">

                        {% if form %}
                            <form method="post">
                                {% csrf_token %}

                                {{ form|crispy }}

                                <button type="submit"
                                        class="btn btn-warning btn-block mt-3">
                                    Guardar nueva contraseña
                                </button>
                            </form>

                        {% else %}

                            <div class="alert alert-danger text-center">
                                <strong>⚠️ Enlace inválido o expirado</strong>
                                <br>
                                <small>Solicita uno nuevo para continuar</small>
                            </div>

                            <a href="{% url 'password_reset' %}"
                               class="btn btn-outline-dark btn-block">
                                Pedir nuevo enlace
                            </a>

                        {% endif %}

                    </div>

                </div>

            </div>
        </div>

    </div>
</section>

{% endblock %}
